<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆瓣 → Letterboxd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #14181c;
      color: #e8ecf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1d2433;
      border: 1px solid #2c3a4a;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #7891a0; margin-bottom: 28px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎬</div>
    <h1>豆瓣 → Letterboxd</h1>
    <p class="subtitle">此页面已停用</p>
  </div>
</body>
</html>
