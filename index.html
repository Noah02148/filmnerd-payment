<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购买完整版 — 豆瓣 → Letterboxd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #14181c;
      color: #e8ecf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1d2433;
      border: 1px solid #2c3a4a;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #7891a0; margin-bottom: 28px; line-height: 1.6; }
    .price {
      font-size: 36px;
      font-weight: 800;
      color: #ef8a00;
      margin-bottom: 4px;
    }
    .price-note { font-size: 12px; color: #7891a0; margin-bottom: 28px; }
    .features {
      text-align: left;
      background: #252e3e;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 28px;
    }
    .features li {
      list-style: none;
      font-size: 13px;
      padding: 5px 0;
      color: #e8ecf0;
    }
    .features li::before { content: "✅ "; }
    .qr-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .qr-wrap img { width: 180px; height: 180px; display: block; }
    .qr-tip { font-size: 13px; color: #7891a0; margin-bottom: 6px; }
    .qr-note {
      font-size: 12px;
      color: #52cc7a;
      background: rgba(0,179,64,0.1);
      border: 1px solid rgba(0,179,64,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 16px;
      line-height: 1.7;
    }
    .contact {
      margin-top: 20px;
      font-size: 12px;
      color: #7891a0;
    }
    .contact a { color: #ef8a00; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎬</div>
    <h1>豆瓣 → Letterboxd 完整版</h1>
    <p class="subtitle">解锁全部观影记录迁移<br>免费版仅迁移前 50 部</p>

    <div class="price">¥8.8</div>
    <p class="price-note">买断制 · 永久使用</p>

    <ul class="features">
      <li>全量迁移看过的电影（无数量限制）</li>
      <li>全量迁移想看列表</li>
      <li>全量迁移豆列 / 片单</li>
      <li>含评分、短评字段</li>
    </ul>

    <p class="qr-tip">支付宝扫码付款</p>
    <div class="qr-wrap">
      <img src="alipay-qr.jpg" alt="支付宝收款码">
    </div>

    <div class="qr-note">
      付款时请在<strong>备注</strong>中填写你的邮箱<br>
      收到款项后 24 小时内发送激活码到该邮箱<br>
      激活码格式：<code style="font-family:monospace">FILMNERD-XXXX-XXXX-XXXX</code>
    </div>

    <p class="contact">
      问题请联系：<a href="mailto:your@email.com">your@email.com</a>
    </p>
  </div>
</body>
</html>
